# Render Blueprint — https://render.com/docs/blueprint-spec
# Sau khi nối GitHub: Dashboard → New → Blueprint → chọn repo này.
# Lần đầu Render sẽ hỏi các biến sync: false (MongoDB, Cloudinary, OpenAI, SMTP).

services:
  # API Node.js (Express)
  - type: web
    name: naturalstore-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Phải trùng URL static site bên dưới (CORS)
      - key: CLIENT_URL
        value: https://naturalstore.onrender.com
      - key: ALLOW_GUEST_CHECKOUT
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # React (Vite) — static site + SPA rewrite
  - type: web
    name: naturalstore
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Phải trùng URL web service API ở trên
      - key: VITE_API_BASE_URL
        value: https://naturalstore-api.onrender.com/api/v1
